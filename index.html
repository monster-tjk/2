<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <header
      class="flex justify-between p-[20px] items-center md:w-400 md:m-auto"
    >
      <h1 class="text-[30px] font-bold text-[#446DF6]">GetWash</h1>
      <nav class="hidden md:flex gap-[100px] md:text-[grey]">
        <p>Как использовать</p>
        <p>Партнерам</p>
        <p>Скачать</p>
        <p>Отзывы</p>
      </nav>
      <div class="hidden md:flex">
        <button
          class="text-[#446DF6] border border-[#464647] px-[30px] py-[15px] rounded-2xl shadow-lg"
        >
          Получить доступ
        </button>
      </div>
      <div class="block md:hidden">
        <i class="fa-solid fa-bars text-2xl text-[#446DF6]"></i>
      </div>
    </header>
    <section class="md:w-400 m-auto">
      <div class="flex flex-col md:flex-row gap-10 justify-center items-center">
        <div
          class="flex flex-col gap-y-[30px] justify-center md:w-[600px] font-black"
        >
          <h1
            class="font-black text-[21px] text-center md:text-left text-[#1a2b49] md:text-4xl p-7"
          >
            Поиск ближайшей свободной автомойки и бронирование на удобное время.
          </h1>

          <div class="md:hidden flex">
            <i
              class="fas fa-long-arrow-alt-down text-3xl text-[#446DF6] m-auto"
            ></i>
          </div>

          <p
            class="text-[16px] text-[#72727E] text-center md:text-left md:text-2xl md:font-extralight"
          >
            Мы поможем сохранить ваше время для более интересных занятий, чем
            стоять в очереди.
          </p>

          <button
            class="px-[50px] py-[20px] bg-[#446DF6] text-xl text-white rounded-2xl sm:w-auto m-auto md:m-0 hover:bg-[#3356c5] transition-colors md:w-[300px]"
          >
            Получить доступ
          </button>
        </div>

        <div class="flex justify-center">
          <img src="./img/Mask Group (2).png" alt="" class="md:hidden" />
          <img
            src="./img/iPhone 12 Pro Mockup 1.png"
            alt=""
            class="hidden md:block"
          />
        </div>
      </div>
    </section>
  </body>
</html>
